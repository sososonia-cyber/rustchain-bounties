name: RustChain Tip Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  tip-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Handle Tip Command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const sender = context.payload.comment.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            
            // Import our bot logic
            const core = require('@actions/core');
            const github = require('@actions/github');
            
            // Parse /tip command: /tip @username AMOUNT RTC [memo]
            const tipMatch = body.match(/\/tip\s+@(\w+)\s+(\d+(?:\.\d+)?)\s*RTC\s*(.*)/i);
            
            // Parse /register command: /register WALLET_NAME
            const registerMatch = body.match(/\/register\s+(\w+)/i);
            
            // Parse /balance command
            const balanceMatch = body.trim().toLowerCase() === '/balance';
            
            // Parse /leaderboard command
            const leaderboardMatch = body.trim().toLowerCase() === '/leaderboard';
            
            // For now, respond with setup instructions
            // In production, this would call the RustChain API
            if (tipMatch || registerMatch || balanceMatch || leaderboardMatch) {
              let response = '';
              
              if (tipMatch) {
                response = `✅ **Tip Command Received**
                
Thank you for using RustChain Tip Bot! 
                
This bounty is still being set up. To claim the /tip functionality, the repository maintainer needs to:
1. Configure the ADMIN_KEY environment variable
2. Set up the RustChain node connection
3. Enable wallet registration
                
Stay tuned for updates! 🚀`;
              } else if (registerMatch) {
                response = `✅ **Wallet Registration**
                
Thank you for registering! This bounty is still being set up.
                
Your wallet will be: \`${registerMatch[1]}\`
                
Stay tuned for updates! 🚀`;
              } else if (balanceMatch) {
                response = `💰 **Balance Check**
                
This feature is being set up. Check back soon!`;
              } else if (leaderboardMatch) {
                response = `🏆 **Leaderboard**
                
This feature is being set up. Check back soon!`;
              }
              
              // Post response
              if (response) {
                await github.rest.issues.createComment({
                  owner: owner,
                  repo: repo,
                  issue_number: issueNumber,
                  body: response
                });
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTCHAIN_NODE: https://50.28.86.131
